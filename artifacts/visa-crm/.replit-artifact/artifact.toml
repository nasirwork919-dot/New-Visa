kind = "web"
previewPath = "/"
title = "VisaCRM"
version = "1.0.0"
id = "artifacts/visa-crm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19693

[services.development]
run = "pnpm --filter @workspace/visa-crm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/visa-crm", "run", "build" ]
publicDir = "artifacts/visa-crm/dist"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19693"
BASE_PATH = "/"
